<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="site-header">
        <div class="header-top">
            <a href="index.html" class="logo">SPORTSHOP</a>
        </div>
        <div class="header-content">
            <h1>Produkter</h1>
        </div>
    </header>

    <main class="productlist-container">

        <section class="product-grid">

            <!-- Normal produkt -->
            <a href="product.html" class="product-card">
                <img src="https://kea-alt-del.dk/t7/images/webp/640/1163.webp" alt="Sport T-shirt">
                <h2>Performance T-Shirt</h2>
                <p class="brand">Nike</p>
                <p class="price">399 kr</p>
            </a>

            <!-- Discount produkt -->
            <a href="product.html" class="product-card discount">
                <span class="badge">TILBUD</span>
                <img src="https://kea-alt-del.dk/t7/images/webp/640/1531.webp" alt="Puma">
                <h2>Training T-shirt</h2>
                <p class="brand">Puma</p>
                <p class="price">
                    <span class="old-price">499 kr</span>
                    399 kr
                </p>
            </a>

            <!-- Sold out produkt -->
            <a href="product.html" class="product-card soldout">
                <span class="badge">UDSOLGT</span>
                <img src="https://kea-alt-del.dk/t7/images/webp/640/1530.webp" alt="Jacket">
                <h2>Track Jacket</h2>
                <p class="brand">Puma</p>
                <p class="price">899 kr</p>
            </a>

            <a href="product.html" class="product-card">
                <img src="https://kea-alt-del.dk/t7/images/webp/640/1526.webp" alt="Backpack">
                <h2>Backpack</h2>
                <p class="brand">Puma</p>
                <p class="price">199 kr</p>
            </a>

        </section>

    </main>

</body>

</html>
