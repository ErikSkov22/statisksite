<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produkt | SPORTSHOP</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header class="site-header">
        <div class="header-top">
            <a href="index.html" class="logo">SPORTSHOP</a>
        </div>

        <div class="header-content">
            <h1>Produkt</h1>
            <p>Sommer kollektion</p>
        </div>
    </header>

    <main class="productpage-container">

        <article class="product-detail">

            <div class="product-image">
                <img src="https://kea-alt-del.dk/t7/images/webp/640/1531.webp" alt="Performance T-Shirt" />
            </div>

            <div class="product-info">
                <p class="brand">Puma</p>
                <h2 class="product-title">Training T-Shirt</h2>

                <p class="price">
                    <span class="old-price">499 kr</span>
                    399 kr
                    <span class="discount-tag">-20%</span>
                </p>

                <p class="stock in-stock">På lager</p>


                <button class="add-to-basket" type="button">Add to basket</button>

                <div class="product-meta">
                    <h3>Produktinfo</h3>
                    <ul>
                        <li>Let og åndbar til træning</li>
                        <li>Perfekt til sommer og aktivitet</li>
                        <li>Materiale: 100% polyester</li>
                    </ul>
                </div>
            </div>

        </article>

    </main>

</body>

</html>
